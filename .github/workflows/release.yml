name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/RSSReader-${{ github.ref_name }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: RSS Reader ${{ github.ref_name }}
          body: |
            ## RSS Reader ${{ github.ref_name }}

            A modern RSS/Atom feed reader for Android inspired by NetNewsWire.

            ### Features
            - Clean, distraction-free article reader with Inter font
            - Dark mode support (OLED-friendly)
            - Feed organization with folders
            - OPML import/export
            - Background sync
            - Full-text search

            ### Installation
            1. Download the APK file below
            2. Enable "Install from unknown sources" if prompted
            3. Install and enjoy!

            ---
            *This is a debug build for testing.*
          files: app/build/outputs/apk/debug/RSSReader-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
